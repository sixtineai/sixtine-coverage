-table .stmt-cell{font-size:12px;color:var(--text-secondary);white-space:nowrap;font-family:JetBrains Mono,monospace}.file-cov-header{margin-bottom:20px}.file-cov-header h3{font-size:18px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}.file-cov-header h3 .material-icons-round{color:var(--teal)}.pkg-card{padding:18px;cursor:pointer;transition:all .15s}.pkg-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}.pkg-card .pkg-name{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pkg-card .pkg-cov{font-size:28px;font-weight:700;margin-bottom:4px}.pkg-card .pkg-detail{font-size:11px;color:var(--text-secondary);margin-top:8px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:#0d9488}.btn-primary:disabled{opacity:.6;cursor:not-allowed}.btn-sm{padding:6px 14px;font-size:12px}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}.btn-outline:hover{background:#f8fafc;border-color:var(--text-muted)}.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}.empty-state .material-icons-round{font-size:48px;margin-bottom:16px;opacity:.4}.empty-state h3{font-size:16px;color:var(--text-secondary);margin-bottom:8px}.text-sm{font-size:13px}.text-muted{color:var(--text-muted)}.font-mono{font-family:JetBrains Mono,monospace}.section-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}.section-title .material-icons-round{font-size:20px;color:var(--teal)}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}::-we
